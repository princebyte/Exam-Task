<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student CRUD App</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-dark: #0ea5e9;
      --danger: #f87171;
      --success: #34d399;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    header {
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 1.25rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
    }

    .secondary {
      background: #334155;
      color: #fff;
    }

    .danger {
      background: var(--danger);
      color: #111827;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th, td {
      padding: 0.9rem;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      vertical-align: middle;
    }

    th {
      color: #cbd5e1;
      font-size: 0.92rem;
    }

    .message {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      display: none;
    }

    .message.success {
      display: block;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #bbf7d0;
    }

    .message.error {
      display: block;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fecaca;
    }

    .inline-edit {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .inline-edit input {
      width: 90px;
      padding: 0.55rem 0.65rem;
    }

    .small {
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 700px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Student CRUD App</h1>
      <p>Manage students with Express, MongoDB, and a simple browser-based interface.</p>
    </header>

    <div class="grid">
      <section class="card">
        <h2 id="formTitle">Add Student</h2>
        <form id="studentForm">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Enter student name" required />
          </div>
          <div>
            <label for="rollNumber">Roll Number</label>
            <input id="rollNumber" name="rollNumber" type="text" placeholder="Enter roll number" required />
          </div>
          <div>
            <label for="branch">Branch</label>
            <input id="branch" name="branch" type="text" placeholder="Enter branch" />
          </div>
          <div>
            <label for="marks">Marks</label>
            <input id="marks" name="marks" type="number" min="0" max="100" placeholder="0 to 100" />
          </div>
          <input type="hidden" id="studentId" />
          <div class="actions full">
            <button type="submit" class="primary" id="submitBtn">Save Student</button>
            <button type="button" class="secondary" id="cancelBtn" style="display:none;">Cancel Edit</button>
          </div>
        </form>
        <div id="message" class="message"></div>
      </section>

      <section class="card">
        <h2>Students</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Branch</th>
                <th>Marks</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTable">
              <tr>
                <td colspan="6" class="muted">Loading students...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    const studentForm = document.getElementById('studentForm');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const messageBox = document.getElementById('message');
    const studentsTable = document.getElementById('studentsTable');
    const studentIdInput = document.getElementById('studentId');
    const nameInput = document.getElementById('name');
    const rollNumberInput = document.getElementById('rollNumber');
    const branchInput = document.getElementById('branch');
    const marksInput = document.getElementById('marks');
    let studentsCache = [];

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showMessage(text, type = 'success') {
      messageBox.textContent = text;
      messageBox.className = `message ${type}`;
      window.setTimeout(() => {
        messageBox.textContent = '';
        messageBox.className = 'message';
      }, 3000);
    }

    function resetForm() {
      studentForm.reset();
      studentIdInput.value = '';
      formTitle.textContent = 'Add Student';
      submitBtn.textContent = 'Save Student';
      cancelBtn.style.display = 'none';
    }

    function fillForm(student) {
      studentIdInput.value = student._id;
      nameInput.value = student.name || '';
      rollNumberInput.value = student.rollNumber || '';
      branchInput.value = student.branch || '';
      marksInput.value = student.marks ?? '';
      formTitle.textContent = 'Edit Student';
      submitBtn.textContent = 'Update Student';
      cancelBtn.style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function fetchStudents() {
      try {
        const response = await fetch('/api/students');
        if (!response.ok) {
          throw new Error('Failed to load students.');
        }

        studentsCache = await response.json();
        renderStudents(studentsCache);
      } catch (error) {
        studentsTable.innerHTML = `<tr><td colspan="6" class="muted">${error.message}</td></tr>`;
      }
    }

    function renderStudents(students) {
      if (!students.length) {
        studentsTable.innerHTML = '<tr><td colspan="6" class="muted">No students found.</td></tr>';
        return;
      }

      studentsTable.innerHTML = students.map((student) => {
        const createdAt = student.createdAt ? new Date(student.createdAt).toLocaleString() : '-';
        return `
          <tr>
            <td>${escapeHtml(student.name || '')}</td>
            <td>${escapeHtml(student.rollNumber || '')}</td>
            <td>${escapeHtml(student.branch || '')}</td>
            <td>
              <div class="inline-edit">
                <input type="number" min="0" max="100" value="${student.marks ?? 0}" id="marks-${student._id}" />
                <button class="small primary" onclick="updateMarks('${student._id}')">Save</button>
              </div>
            </td>
            <td>${escapeHtml(createdAt)}</td>
            <td>
              <div class="actions">
                <button class="small secondary" onclick="editStudentById('${student._id}')">Edit</button>
                <button class="small danger" onclick="deleteStudent('${student._id}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function editStudentById(id) {
      const student = studentsCache.find((item) => item._id === id);
      if (student) {
        fillForm(student);
      }
    }

    async function createStudent(payload) {
      const response = await fetch('/api/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Unable to create student.');
      }

      return data;
    }

    async function updateStudent(id, payload) {
      const response = await fetch(`/api/students/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || 'Unable to update student.');
      }

      return data;
    }

    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) {
        return;
      }

      try {
        const response = await fetch(`/api/students/${id}`, { method: 'DELETE' });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Unable to delete student.');
        }

        showMessage(data.message || 'Student deleted successfully.');
        fetchStudents();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    async function updateMarks(id) {
      const marksValue = document.getElementById(`marks-${id}`).value;

      try {
        await updateStudent(id, { marks: marksValue });
        showMessage('Marks updated successfully.');
        fetchStudents();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    studentForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const payload = {
        name: nameInput.value.trim(),
        rollNumber: rollNumberInput.value.trim(),
        branch: branchInput.value.trim(),
        marks: marksInput.value,
      };

      try {
        if (studentIdInput.value) {
          await updateStudent(studentIdInput.value, payload);
          showMessage('Student updated successfully.');
        } else {
          await createStudent(payload);
          showMessage('Student added successfully.');
        }

        resetForm();
        fetchStudents();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    cancelBtn.addEventListener('click', () => {
      resetForm();
    });

    fetchStudents();
  </script>
</body>
</html>
